syntax = "proto3";

// Generate Go stubs from repo root with:
// protoc --proto_path=proto --go_out=. --go_opt=module=github.com/atls-academy/engineer-challenge --go-grpc_out=. --go-grpc_opt=module=github.com/atls-academy/engineer-challenge proto/auth.proto

package auth.v1;
option go_package = "github.com/atls-academy/engineer-challenge/internal/interfaces/grpc/pb";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
  rpc GetMe(GetMeRequest) returns (GetMeResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  string user_id = 1;
  string email = 2;
}

message AuthenticateRequest {
  string email = 1;
  string password = 2;
}

message AuthenticateResponse {
  string access_token = 1;
  string refresh_token = 2;
  string user_id = 3;
  string email = 4;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RequestPasswordResetRequest {
  string email = 1;
}

message RequestPasswordResetResponse {
  string token = 1;
}

message ResetPasswordRequest {
  string email = 1;
  string token = 2;
  string new_password = 3;
}

message ResetPasswordResponse {}

message GetMeRequest {
  string access_token = 1;
}

message GetMeResponse {
  string user_id = 1;
  string email = 2;
  string status = 3;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {}
